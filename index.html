<div class="container">

    <h1>7月 検査同行 参加希望フォーム</h1>
    <p>名前を選択し、同行できる日程にチェックを入れて送信してください</p>

      <button onclick="saveToken()">保存</button>
    </div>
  </div>
  <div id="tokenOk" class="token-ok" style="display:none">
    <span>✅ Notion接続済み</span>
    <button onclick="clearToken()">トークンをリセット</button>
  </div>

  <div id="formArea">
    <div class="card">
      <div class="label">研修生名</div>
      <select id="trainee" onchange="onNameChange()">
        <option value="">-- 選択してください --</option>
        <option value="伊藤">伊藤</option>
        <option value="渡口">渡口</option>
        <option value="武内">武内</option>
      </select>
      <button class="manage-btn" id="manageBtn" onclick="toggleManage()">名前を管理</button>
      <div class="manage-panel" id="managePanel">
        <p style="font-size:12px;color:#888;margin-bottom:8px">登録済みの研修生</p>
        <div class="name-tags" id="nameTags"></div>
        <div class="add-row">
          <input type="text" id="newName" placeholder="名前を入力" onkeydown="if(event.key==='Enter')addName()">
          <button onclick="addName()">＋ 追加</button>
        </div>
      </div>
    </div>

    <div id="schedule"></div>

    <div class="submit-area">
      <p class="count" id="count">0件選択中</p>
      <p class="err" id="err">名前を選択してから送信してください</p>
      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">同行希望を送信する</button>
    </div>
  </div>

  <div class="sending" id="sending">
    <div class="spinner"></div>
    <p style="font-size:14px;color:#666">Notionに送信中...</p>
  </div>

  <div class="success" id="success">
    <div class="icon">✅</div>
    <h2>送信完了しました！</h2>
    <button class="reset-btn" onclick="resetForm()">別の人の回答を入力する</button>
  </div>
</div>

function onNameChange(){
  const name = document.getElementById('trainee').value;
  const btn = document.getElementById('manageBtn');
  btn.classList.toggle('visible', name === '武内');
  if(name !== '武内') document.getElementById('managePanel').classList.remove('open');
}

function renderSelect(){
  const sel = document.getElementById('trainee');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 選択してください --</option>';
  trainees.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if(n === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function renderTags(){
  const wrap = document.getElementById('nameTags');
  wrap.innerHTML = '';
  trainees.forEach(n => {
    const tag = document.createElement('span');
    tag.className = 'name-tag';
    tag.innerHTML = `${n}<button onclick="removeName('${n}')">×</button>`;
    wrap.appendChild(tag);
  });
}

function toggleManage(){
  const p = document.getElementById('managePanel');
  p.classList.toggle('open');
  renderTags();
}

function addName(){
  const inp = document.getElementById('newName');
  const name = inp.value.trim();
  if(!name || trainees.includes(name)){ inp.value=''; return; }
  trainees.push(name);
  inp.value='';
  renderSelect();
  renderTags();
}

function removeName(name){
  if(trainees.length <= 1){ alert('最低1名は必要です'); return; }
  trainees = trainees.filter(n => n !== name);
  renderSelect();
  renderTags();
}

function buildSchedule(){
  const wrap = document.getElementById('schedule');
  wrap.innerHTML = '';
  schedule.forEach(day => {
    const block = document.createElement('div');
    block.className = 'day-block';
    block.innerHTML = `<div class="day-header">📅 ${day.date}</div>`;
    day.slots.forEach(slot => {
      const lbl = document.createElement('label');
      lbl.className = 'slot';
      lbl.innerHTML = `
        <input type="checkbox" value="${slot.id}" onchange="onCheck(this)">
        <span class="slot-time">${slot.time}</span>
        <div class="slot-info">
          <div class="slot-name">${slot.store}</div>
          <div class="slot-address">📍 ${slot.address}</div>
          <span class="slot-staff">${slot.staff}</span>
        </div>
      `;
      block.appendChild(lbl);
    });
    wrap.appendChild(block);
  });
}

function onCheck(el){
  const row = el.closest('.slot');
  if(el.checked){ checked.add(el.value); row.classList.add('checked'); }
  else { checked.delete(el.value); row.classList.remove('checked'); }
  document.getElementById('count').textContent = checked.size + '件選択中';
}

async function handleSubmit(){
  const name = document.getElementById('trainee').value;
  const errEl = document.getElementById('err');
  if(!name){ errEl.style.display='block'; return; }
  errEl.style.display='none';
  if(checked.size === 0){ alert('同行できる日程を1つ以上選択してください'); return; }

  document.getElementById('formArea').style.display='none';
  document.getElementById('sending').style.display='block';

  const TOKEN = localStorage.getItem('notion_token');
  if(!TOKEN){ alert('Notionトークンが設定されていません。ページ上部の設定からトークンを入力してください。'); document.getElementById('sending').style.display='none'; document.getElementById('formArea').style.display='block'; return; }
  for(const pageId of [...checked]){
    try{
      await fetch(`https://api.notion.com/v1/pages/${pageId}`,{
        method:'PATCH',
        headers:{
          'Authorization':'Bearer ' + TOKEN,
          'Content-Type':'application/json',
          'Notion-Version':'2022-06-28'
        },
        body:JSON.stringify({
          properties:{
            '研修生':{rich_text:[{type:'text',text:{content:name}}]}
          }
        })
      });
    }catch(e){}
  }

  document.getElementById('sending').style.display='none';
  document.getElementById('success').style.display='block';
}

function resetForm(){
  checked.clear();
  document.getElementById('success').style.display='none';
  document.getElementById('formArea').style.display='block';
  document.getElementById('trainee').value='';
  document.getElementById('manageBtn').classList.remove('visible');
  document.getElementById('count').textContent='0件選択中';
  document.querySelectorAll('.slot input[type=checkbox]').forEach(c=>{ c.checked=false; c.closest('.slot').classList.remove('checked'); });
}

function saveToken(){
  const t = document.getElementById('tokenInput').value.trim();
  if(!t){ alert('トークンを入力してください'); return; }
  localStorage.setItem('notion_token', t);
  checkToken();
}

function clearToken(){
  localStorage.removeItem('notion_token');
  checkToken();
}

function checkToken(){
  const t = localStorage.getItem('notion_token');
  document.getElementById('tokenSetup').style.display = t ? 'none' : 'block';
  document.getElementById('tokenOk').style.display = t ? 'flex' : 'none';
}

buildSchedule();
checkToken();
</script>
</body>
</html>
